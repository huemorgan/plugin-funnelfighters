description = "Marketing intelligence via FunnelFighters + 4 Ducks methodology"
entry = "plugin_funnelfighters"
sdk_version = "0"
license = "MIT"
category = "connectors"
default_enabled = false
tags = ["marketing", "analytics", "connector"]
readme = """
# plugin-funnelfighters

Marketing intelligence for Luna, powered by the FunnelFighters API and the
**4 Ducks** funnel-analysis methodology. Ships **installed but OFF** — enable it
in Settings → Plugins, then add API key + organization ID pairs in the
FunnelFighters tab (served as a themed iframe from the managed dir).

Supports **multiple workspaces**: connect several key + org pairs (in Settings
or via the `ff_connect` agent tool); each connection is named after its
FunnelFighters workspace, and the data tools take an optional `workspace`
argument (omit it when only one is connected).

15 read-only data tools (campaigns, ads, funnels, cohorts, ROI, wasted
spend, …), 3 workspace-management tools, and the `four-ducks` skill the agent
loads on demand. Built on `luna_sdk` v0: credentials via `ctx.vault`, authed
routes via `luna_sdk.get_current_user`, live connections held in a
module-level registry — no `import luna.*`.

Source: https://github.com/huemorgan/plugin-funnelfighters
"""

