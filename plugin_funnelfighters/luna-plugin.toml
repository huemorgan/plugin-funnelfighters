name = "plugin-funnelfighters"
version = "0.2.0"
description = "Marketing intelligence via FunnelFighters + 4 Ducks methodology"
entry = "plugin_funnelfighters"
sdk_version = "0"
license = "MIT"
category = "connectors"
default_enabled = false
tags = ["marketing", "analytics", "connector"]
readme = """
# plugin-funnelfighters

Marketing intelligence for Luna, powered by the FunnelFighters API and the
**4 Ducks** funnel-analysis methodology. Ships **installed but OFF** — enable it
in Settings → Plugins, then paste your API key + organization ID in the
FunnelFighters tab (served as a themed iframe from the managed dir).

15 read-only tools (campaigns, ads, funnels, cohorts, ROI, wasted spend, …) and
the `four-ducks` skill the agent loads on demand. Built on `luna_sdk` v0:
credentials via `ctx.vault`, authed routes via `luna_sdk.get_current_user`, live
client held in a module singleton — no `import luna.*`.

Source: https://github.com/huemorgan/plugin-funnelfighters
"""

[requires]
tools = 15
skills = 1
depends_on = ["plugin-vault"]

